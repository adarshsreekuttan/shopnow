<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Admin Dashboard</title>
</head>
<body class="bg-gray-100 flex min-h-screen">
    <aside class="w-64 bg-slate-800 text-white hidden md:flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-slate-700">ShopEase</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-2.5 bg-indigo-600 rounded-lg">Dashboard</a>
            <a href="{% url 'cat_list' %}" class="block px-4 py-2.5 hover:bg-slate-700 rounded-lg transition">Categories</a>
            <a href="#" class="block px-4 py-2.5 hover:bg-slate-700 rounded-lg transition">Products</a>
            <a href="#" class="block px-4 py-2.5 hover:bg-slate-700 rounded-lg transition">Orders</a>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <a href="{% url 'admin_logout' %}" class="text-sm text-slate-400 hover:text-white">Logout</a>
        </div>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Overview</h2>
            <div class="bg-white px-4 py-2 rounded-lg shadow-sm border">
                <span class="text-sm font-medium text-gray-600">Admin: {{ user.username }}</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Sales</p>
                <p class="text-2xl font-bold text-gray-800">$24,500</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Orders</p>
                <p class="text-2xl font-bold text-gray-800">1,240</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
                <p class="text-sm text-gray-500 uppercase font-bold">New Customers</p>
                <p class="text-2xl font-bold text-gray-800">45</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="p-4 border-b font-bold text-gray-700">Recent Orders</div>
            <table class="w-full text-left">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4 text-xs font-bold text-gray-500">ORDER ID</th>
                        <th class="p-4 text-xs font-bold text-gray-500">CUSTOMER</th>
                        <th class="p-4 text-xs font-bold text-gray-500">STATUS</th>
                        <th class="p-4 text-xs font-bold text-gray-500">TOTAL</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr>
                        <td class="p-4 text-sm">#8821</td>
                        <td class="p-4 text-sm">John Doe</td>
                        <td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">Shipped</span></td>
                        <td class="p-4 text-sm font-bold">$120.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
