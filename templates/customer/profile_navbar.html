<div class="w-full bg-white border-b border-gray-100 sticky top-[64px] z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between py-2 overflow-x-auto no-scrollbar">

      <nav class="flex items-center gap-2 flex-nowrap whitespace-nowrap">
        <a href="{% url 'home' %}"
           class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold
                  transition-colors
                  {% if request.resolver_match.url_name == 'home' %}
                    bg-primary text-white shadow-sm
                  {% else %}
                    text-gray-500 hover:text-pdark hover:bg-gray-50
                  {% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Home
        </a>

        <a href="{% url 'profile_page' %}"
           class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold
                  transition-colors
                  {% if request.resolver_match.url_name == 'profile_personal_information' %}
                    bg-primary text-white shadow-sm
                  {% else %}
                    text-gray-500 hover:text-pdark hover:bg-gray-50
                  {% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Personal Info
        </a>

        <a href="{% url 'view_orders' %}"
           class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold
                  text-gray-500 hover:text-pdark hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
          My Orders
        </a>

        <a href="{% url 'view_addresses' %}"
           class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold
                  transition-colors
                  {% if request.resolver_match.url_name == 'profile_addresses' %}
                    bg-primary text-white shadow-sm
                  {% else %}
                    text-gray-500 hover:text-pdark hover:bg-gray-50
                  {% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
          </svg>
          Addresses
        </a>

        <a href="#"
           class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold
                  text-gray-500 hover:text-pdark hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227
                     1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501
                     48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/>
          </svg>
          Contact Us
        </a>
      </nav>

      <div class="ml-4 flex-shrink-0">
        <a href="{% url 'customer_logout' %}"
           class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold
                  text-red-500 hover:bg-red-50 transition-colors">
          <span class="hidden sm:inline">Logout</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</div>
