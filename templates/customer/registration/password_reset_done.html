<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | Shop Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { pdark: '#362F4F', primary: '#5B23FF', highlight: '#E4FF30' } } }
        }
    </script>
</head>
<body class="bg-[url('https://images.unsplash.com/photo-1586880244406-556ebe35f282?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center bg-fixed min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-gray-900/60"></div>
    <div class="relative z-10 w-full max-w-md bg-white/95 rounded-md shadow-xl p-8 text-center border border-gray-200">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-6">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h2 class="text-2xl font-semibold text-pdark mb-2">Check your email</h2>
        <p class="text-gray-600 text-sm mb-8">We've sent a password reset link to your email address. If it doesn't arrive soon, check your spam folder.</p>
        <a href="{% url 'user_login' %}" class="inline-block w-full bg-pdark text-white font-semibold py-3 rounded-md hover:bg-primary transition">
            Back to Login
        </a>
    </div>
</body>
</html>
