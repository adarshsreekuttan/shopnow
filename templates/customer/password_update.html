<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password | ShopNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pdark: '#362F4F', primary: '#5B23FF', accent: '#008BFF', highlight: '#E4FF30', lightbg: '#F8F9FA' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-lightbg font-sans antialiased text-gray-800">
    <div class="flex flex-col gap-0">
        {% include 'customer/navbar.html' %}
        {% include 'customer/profile_navbar.html' %}
    </div>

    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-10 max-w-5xl">
        <div class="flex flex-col md:flex-row gap-6">
            <div class="flex-grow space-y-6">
                <form method="POST" class="bg-white p-6 sm:p-8 rounded-md shadow-sm border border-gray-100">
                    {% csrf_token %}
                    <h2 class="text-lg font-semibold text-pdark mb-6">Security &amp; Password</h2>
                    <div class="space-y-4 max-w-md">
                        <div class="space-y-1.5">
                            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Current Password</label>
                            <input type="password" name="current_password" placeholder="••••••••"
                                   class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2.5 text-sm
                                          focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">New Password</label>
                            <input type="password" name="new_password" placeholder="Min. 8 characters"
                                   class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2.5 text-sm
                                          focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Retype New Password</label>
                            <input type="password" name="retype_new_password" placeholder="Min. 8 characters"
                                   class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2.5 text-sm
                                          focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
                        </div>

                        {% if error %}
                        <div class="mt-4 flex items-center gap-2 bg-red-50 border border-red-100 text-red-600 p-3 rounded-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <p class="text-sm font-medium">{{error}}</p>
                        </div>
                        {% endif %}
                    </div>

                    <div class="mt-8 pt-4 border-t border-gray-100 flex justify-end">
                        <button type="submit"
                                class="bg-primary text-white font-semibold py-2.5 px-8 rounded-md shadow-md
                                       hover:shadow-primary/30 transition transform active:scale-95 text-xs">
                            Update Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
