<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pdark: '#362F4F', primary: '#5B23FF', accent: '#008BFF', highlight: '#E4FF30', lightbg: '#F8F9FA' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-lightbg font-sans antialiased text-gray-800">
    
    <div class="flex flex-col gap-0">
        {% include 'customer/navbar.html' %}            
        {% include 'customer/profile_navbar.html' %}            
    </div>    

    <main class="container mx-auto px-4 py-10 max-w-5xl flex-grow">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="flex-grow space-y-6">
                <form method="POST" class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                    {% csrf_token %}
                    <h2 class="text-lg font-bold text-pdark mb-6">Security & Password</h2>
                    <div class="space-y-4 max-w-md">
                        <div class="space-y-2">
                            <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Current Password</label>
                            <input type="password" name="current_password" placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-gray-400 uppercase tracking-widest">New Password</label>
                            <input type="password" name="new_password" placeholder="Min. 8 characters" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Retype New Password</label>
                            <input type="password" name="retype_new_password"placeholder="Min. 8 characters" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
                        </div>
                        {% if error %}
                            <div class="flex items-center gap-3 bg-red-50 border border-red-100 text-red-600 p-4 rounded-xl mt-6 animate-pulse">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <p class="text-sm font-medium">{{error}}</p>
                            </div>
                        {% endif %}
                    </div>
                    <div class="mt-8 pt-6 border-t border-gray-100 flex justify-end">
                        <button type="submit" class="bg-primary text-white font-bold py-3 px-10 rounded-xl shadow-lg hover:shadow-primary/30 transition transform active:scale-95">
                            Update Password
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script>
        // Simple preview for avatar upload
        document.getElementById('avatar-input').onchange = evt => {
            const [file] = evt.target.files;
            if (file) {
                document.getElementById('avatar-preview').src = URL.createObjectURL(file);
            }
        }
    </script>
        

</body>

</html>
