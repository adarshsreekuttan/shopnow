{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Shop Now{% endblock %}</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            pdark: '#362F4F', 
            primary: '#5B23FF', 
            accent: '#008BFF', 
            highlight: '#E4FF30', 
            lightbg: '#F8F9FA' 
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    html { scroll-behavior: smooth; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body class="bg-lightbg text-pdark font-sans antialiased flex flex-col min-h-screen">

  {% include 'customer/navbar.html' %}

  <main class="flex-grow">
    {% block content %}
    {% endblock %}
  </main>

  {% include 'customer/footer.html' %}

  <script>
    // CSRF Token Helper for AJAX calls
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Global WebSocket connection for real-time features (Channels/Daphne)
    // const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
    // const globalSocket = new WebSocket(wsProtocol + window.location.host + '/ws/global/');
    // globalSocket.onmessage = function(e) { console.log('Server says:', e.data); };
  </script>

  {% block extra_js %}{% endblock %}

</body>
</html>
