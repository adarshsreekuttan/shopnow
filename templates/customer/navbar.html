<nav class="sticky top-0 z-50 bg-pdark text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between py-3 gap-2">

      <a href="{% url 'home' %}"
        class="flex items-center text-xl md:text-2xl font-bold italic tracking-tight shrink-0">
        <span class="text-highlight">Shop</span><span>Now</span>
      </a>

      <form method="GET" action="{% url 'search_products' %}" class="flex-1 max-w-xl mx-auto px-4 hidden md:block">
        <div class="relative w-full">
          <input required type="text" name="search_keyword" id="searchBox" autocomplete="off"
            value="{{search_keyword}}" placeholder="Search products..."
            class="w-full pl-4 pr-12 py-2 rounded-md text-sm text-gray-900 bg-white border focus:outline-none focus:ring-2 focus:ring-highlight/80">
          <div id="suggestions" class="absolute left-0 top-full w-full bg-white border mt-1 rounded shadow z-50 hidden max-h-60 overflow-y-auto"></div>
          <button type="submit" class="absolute right-0 top-0 h-full px-4 text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
        </div>
      </form>

      <div class="flex items-center gap-2 sm:gap-4 shrink-0">
        {% if user.is_authenticated and user.role == 'customer' %}
          <a href="{% url 'view_cart' %}" class="relative p-2 hover:text-highlight">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4m-8 2a2 2 0 11-4 0 2 2 0 014 0"/></svg>
          </a>
        {% else %}
          
          <a href="{% url 'seller_registration' %}"
            class="whitespace-nowrap border border-highlight text-highlight hover:bg-highlight hover:text-pdark px-2 py-1.5 md:px-4 md:py-2 rounded text-[10px] sm:text-xs font-bold uppercase tracking-tight transition-all">
            Become a Seller
          </a>

          <div class="flex items-center border-l border-gray-600 ml-1 pl-2 gap-2 sm:gap-3">
            <a href="{% url 'user_login' %}" class="text-[11px] sm:text-xs font-medium hover:text-highlight whitespace-nowrap">
              Login
            </a>
            <span class="text-gray-500 text-[10px]">|</span>
            <a href="{% url 'customer_register' %}" class="text-[11px] sm:text-xs font-medium hover:text-highlight whitespace-nowrap">
              Register
            </a>
          </div>

        {% endif %}
      </div>
    </div>

    <form method="GET" action="{% url 'search_products' %}" class="pb-3 md:hidden">
      <div class="relative">
        <input id="searchBoxMobile" type="text" name="search_keyword" autocomplete="off" value="{{search_keyword}}"
          placeholder="Search for products..."
          class="w-full pl-4 pr-10 py-2 rounded-md text-sm text-gray-900 bg-white focus:outline-none focus:ring-2 focus:ring-highlight/80">
        <div id="suggestionsMobile" class="absolute left-0 top-full w-full bg-white border mt-1 rounded shadow z-50 hidden max-h-60 overflow-y-auto"></div>
      </div>
    </form>
  </div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", function(){

    function setupSearch(boxId, suggestionId){
        let box = document.getElementById(boxId);
        let suggestionsBox = document.getElementById(suggestionId);

        if (!box) return;

        box.addEventListener("keyup", function() {
            let query = this.value;

            if (query.length < 1) {
                suggestionsBox.innerHTML = "";
                suggestionsBox.classList.add("hidden");
                return;
            }

            fetch(`/search-suggestions/?q=${query}`)
            .then(res => res.json())
            .then(data => {
                suggestionsBox.innerHTML = "";

                if (data.length === 0) {
                    suggestionsBox.classList.add("hidden");
                    return;
                }

                data.forEach(item => {
                    let div = `<div onclick="selectItem('${item.name}','${boxId}','${suggestionId}')"
                                class="p-2 hover:bg-gray-100 cursor-pointer text-sm text-black">
                                ${item.name}
                              </div>`;
                    suggestionsBox.innerHTML += div;
                });

                suggestionsBox.classList.remove("hidden");
            });
        });
    }

    window.selectItem = function(name, boxId, suggestionId){
        let box = document.getElementById(boxId);
        let suggestionsBox = document.getElementById(suggestionId);

        box.value = name;
        suggestionsBox.innerHTML = "";
        suggestionsBox.classList.add("hidden");

        if (box.form) box.form.submit();
    }

    // initialize both
    setupSearch("searchBox", "suggestions");
    setupSearch("searchBoxMobile", "suggestionsMobile");

});
</script>
