<nav class="sticky top-0 z-50 bg-pdark text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between py-3 gap-4">

      <!-- Logo -->
      <a href="{% url 'home' %}"
         class="flex items-center gap-2 text-2xl font-bold italic tracking-tight shrink-0">
        <span class="text-highlight">Shop</span>Now
      </a>

      <!-- Desktop search -->
       <form method="GET" action="{% url 'search_products' %}" class="flex-1 max-w-2xl mx-auto px-6 hidden md:block">
        <div class="relative w-full">
            <input
                required
                type="text"
                name="search_keyword"
                id="searchBox"
                autocomplete="off"
                value="{{search_keyword}}"
                placeholder="Search for products, brands and more..."
                class="w-full pl-4 pr-12 py-2.5 rounded-md text-sm text-gray-900 bg-white 
                      border border-gray-200 shadow-sm
                      focus:outline-none focus:ring-2 focus:ring-highlight/80 focus:border-transparent
                      placeholder-gray-400 transition-all"
            >
            <div id="suggestions" 
                class="absolute left-0 top-full w-full bg-white border mt-1 rounded shadow z-50 hidden max-h-60 overflow-y-auto">
            </div>

            <button 
                type="submit"
                class="absolute right-0 top-0 h-full px-4 text-gray-500 hover:text-primary transition-colors flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </button>
        </div>
    </form>

      <!-- Right side -->
      {% if user.is_authenticated %}
      <div class="flex items-center gap-4 md:gap-6 shrink-0">

        <!-- Profile -->
        <a href="{% url 'profile_page' %}"
           class="flex flex-col items-center text-[10px] md:text-xs lg:text-sm hover:text-highlight transition-colors">
          <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span class="hidden xs:block">Profile</span>
        </a>

        <!-- Wishlist -->
        <a href="{% url 'view_wishlist' %}"
           class="flex flex-col items-center text-[10px] md:text-xs lg:text-sm hover:text-highlight transition-colors">
          <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
          <span class="hidden xs:block">Wishlist</span>
        </a>

        <!-- Cart -->
        <a href="{% url 'view_cart' %}"
           class="relative flex flex-col items-center text-[10px] md:text-xs lg:text-sm hover:text-highlight transition-colors">
          <span
            class="absolute -top-1 -right-2 bg-highlight text-pdark text-[10px] font-bold px-1.5 py-0.5 rounded-md">
            3
          </span>
          <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4m-8 2a2 2 0 11-4 0 2 2 0 014 0"/>
          </svg>
          <span class="hidden xs:block">Cart</span>
        </a>
      </div>
      {% else %}
      <div class="flex items-center gap-4 md:gap-6 shrink-0">

        <!-- Login -->
        <a href="{% url 'customer_login' %}"
           class="flex flex-col items-center text-[10px] md:text-xs lg:text-sm hover:text-highlight transition-colors">
          <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          <span class="hidden sm:block">Login</span>
        </a>

        <!-- Register -->
        <a href="{% url 'customer_register' %}"
           class="flex flex-col items-center text-[10px] md:text-xs lg:text-sm hover:text-highlight transition-colors">
          <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 4v16m8-8H4"/>
          </svg>
          <span class="hidden sm:block">Register</span>
        </a>

      </div>
      {% endif %}
    </div>

    <!-- Mobile search -->
     <form method="GET" action="{% url 'search_products' %}">
    <div class="pb-3 md:hidden">
      <div class="relative">
        <input
          id="searchBoxMobile"
          type="text"
          name="search_keyword"
          autocomplete="off"
          value="{{search_keyword}}" 
          placeholder="Search for products, brands and more..."
          class="w-full pl-4 pr-10 py-2 rounded-md text-sm text-gray-900 bg-white
                 focus:outline-none focus:ring-2 focus:ring-highlight/80 focus:border-transparent
                 placeholder-gray-400"
        >
        <div id="suggestionsMobile"
            class="absolute left-0 top-full w-full bg-white border mt-1 rounded shadow z-50 hidden max-h-60 overflow-y-auto">
        </div>
        <button
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </button>
      </div>
    </div>
    </form>
  </div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", function(){

    function setupSearch(boxId, suggestionId){
        let box = document.getElementById(boxId);
        let suggestionsBox = document.getElementById(suggestionId);

        if (!box) return;

        box.addEventListener("keyup", function() {
            let query = this.value;

            if (query.length < 1) {
                suggestionsBox.innerHTML = "";
                suggestionsBox.classList.add("hidden");
                return;
            }

            fetch(`/search-suggestions/?q=${query}`)
            .then(res => res.json())
            .then(data => {
                suggestionsBox.innerHTML = "";

                if (data.length === 0) {
                    suggestionsBox.classList.add("hidden");
                    return;
                }

                data.forEach(item => {
                    let div = `<div onclick="selectItem('${item.name}','${boxId}','${suggestionId}')"
                                class="p-2 hover:bg-gray-100 cursor-pointer text-sm text-black">
                                ${item.name}
                              </div>`;
                    suggestionsBox.innerHTML += div;
                });

                suggestionsBox.classList.remove("hidden");
            });
        });
    }

    window.selectItem = function(name, boxId, suggestionId){
        let box = document.getElementById(boxId);
        let suggestionsBox = document.getElementById(suggestionId);

        box.value = name;
        suggestionsBox.innerHTML = "";
        suggestionsBox.classList.add("hidden");

        if (box.form) box.form.submit();
    }

    // initialize both
    setupSearch("searchBox", "suggestions");
    setupSearch("searchBoxMobile", "suggestionsMobile");

});
</script>
