{% load static %}
<div class="w-full h-[350px] md:h-[450px] bg-gray-50 rounded-lg flex items-center justify-center p-4 relative mb-4">
    {% for x in product %}
    {% if x.productimage_set.exists %}
        <img id="main-product-image" src="{{ x.productimage_set.first.image.url }}" alt="{{ product.name }}" class="max-w-[85%] max-h-[85%] object-contain mix-blend-darken transition-all duration-300">
    {% else %}
        <img id="main-product-image" src="{% static 'images/no-image.jpg' %}" alt="No image available" class="max-w-[85%] max-h-[85%] object-contain mix-blend-darken opacity-50">
    {% endif %}
    {% endfor %}
    
    <button class="absolute top-4 right-4 bg-white p-2.5 rounded-full shadow-md hover:bg-gray-50 transition text-gray-400 hover:text-red-500 z-10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
    </button>
</div>
