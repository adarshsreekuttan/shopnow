{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopNow | Seller Hub{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pdark: '#362F4F',
                        primary: '#5B23FF',
                        accent: '#008BFF',
                        highlight: '#E4FF30',
                        lightbg: '#F8F9FA'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Moved specific Seller Dashboard styling (noise, pulse, nav logic) 
           out of the base and into seller_home.html or a dedicated seller.css 
           to keep the base completely consistent with the customer side. */

        {% block extra_css %}{% endblock %}
    </style>
</head>

<body class="bg-lightbg text-pdark font-sans antialiased flex flex-col min-h-screen">
    
    {% include "seller/navbar.html" %}

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    {% include 'seller/footer.html' %}

    <script>
        // Aligned with Customer Base: CSRF Token Helper for AJAX calls
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== "") {
                const cookies = document.cookie.split(";");
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + "=")) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Universal Navigation Active State Handler (Seller Specific)
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
