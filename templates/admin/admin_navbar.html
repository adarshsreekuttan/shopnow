

<aside class="w-64 max-w-full h-[100dvh] bg-slate-900 text-slate-300 border-r border-slate-800 flex flex-col">

    <!-- Header -->
    <div class="h-20 flex items-center px-5 border-b border-slate-800 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-shopping-bag text-white text-sm"></i>
            </div>
            <span class="text-lg font-semibold text-white">
                Shop<span class="text-indigo-400">Now</span>
            </span>
        </div>
    </div>

    <!-- Menu -->
    <nav class="flex-1 px-3 py-5 space-y-5 overflow-hidden">

        <!-- MAIN -->
        <div class="space-y-1">
            <p class="text-[11px] font-semibold text-slate-500 px-3 tracking-wide">MAIN</p>

            <a href="{% url 'admin_dashboard' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if request.resolver_match.url_name == 'admin_dashboard' %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-chart-pie w-4 text-center text-slate-400"></i>
                <span>Dashboard</span>
            </a>
        </div>

        <!-- MANAGEMENT -->
        <div class="space-y-1">
            <p class="text-[11px] font-semibold text-slate-500 px-3 tracking-wide">MANAGEMENT</p>

            <a href="{% url 'category_list' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'category' in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-layer-group w-4 text-center text-slate-400"></i>
                <span>Categories</span>
            </a>

            <a href="{% url 'product_view' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'product' in request.path and 'pending' not in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-boxes-stacked w-4 text-center text-slate-400"></i>
                <span>Products</span>
            </a>

            <a href="{% url 'order_view' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'order' in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-receipt w-4 text-center text-slate-400"></i>
                <span>Orders</span>
            </a>

            <a href="{% url 'user_view' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'user' in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-user-friends w-4 text-center text-slate-400"></i>
                <span>Customers</span>
            </a>

            <a href="{% url 'seller_view' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'seller' in request.path and 'pending' not in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-shop w-4 text-center text-slate-400"></i>
                <span>Sellers</span>
            </a>
        </div>

        <!-- PENDING -->
        <div class="space-y-1">
            <p class="text-[11px] font-semibold text-slate-500 px-3 tracking-wide">PENDING</p>

            <a href="{% url 'pending_seller' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'pending_seller' in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-user-clock w-4 text-center text-slate-400"></i>
                <span>Seller Approvals</span>
            </a>

            <a href="{% url 'pending_products' %}" 
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition
               {% if 'pending_products' in request.path %}
               bg-indigo-600 text-white
               {% else %}
               hover:bg-slate-800 hover:text-white
               {% endif %}">
                <i class="fas fa-clipboard-list w-4 text-center text-slate-400"></i>
                <span>Product Approvals</span>
            </a>
        </div>

    </nav>

    <!-- Logout -->
    <div class="p-4 border-t border-slate-800 shrink-0">
        <a href="#" 
           class="flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm
           bg-slate-800 text-red-400 hover:bg-red-500 hover:text-white transition">
            <i class="fas fa-power-off"></i>
            <span>Sign Out</span>
        </a>
    </div>

</aside>
