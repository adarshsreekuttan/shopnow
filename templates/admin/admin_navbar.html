<div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity opacity-0" aria-hidden="true"></div>

<aside id="admin-sidebar" class="fixed inset-y-0 left-0 z-50 w-64 h-[100dvh] bg-slate-900 border-r border-slate-800 flex flex-col transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">

    <div class="h-20 flex items-center justify-between px-6 border-b border-slate-800 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30">
                <i class="fas fa-shopping-bag text-white text-sm"></i>
            </div>
            <span class="text-xl font-black tracking-tight text-white">
                Shop<span class="text-brand-400">Now</span>
            </span>
        </div>
        <button id="close-sidebar" class="md:hidden text-slate-400 hover:text-white transition-colors p-2 -mr-2">
            <i class="fas fa-times text-lg"></i>
        </button>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-8 overflow-y-auto custom-scrollbar-dark">

        <div class="space-y-2">
            <p class="text-[10px] font-bold text-slate-500 px-3 uppercase tracking-widest mb-3">Main</p>

            <a href="{% url 'admin_dashboard' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if request.resolver_match.url_name == 'admin_dashboard' %}
               bg-brand-600 text-white font-bold shadow-md shadow-brand-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-chart-pie w-5 text-center transition-colors
                {% if request.resolver_match.url_name == 'admin_dashboard' %}text-white{% else %}text-slate-500 group-hover:text-brand-400{% endif %}"></i>
                <span>Dashboard</span>
            </a>
        </div>

        <div class="space-y-2">
            <p class="text-[10px] font-bold text-slate-500 px-3 uppercase tracking-widest mb-3">Management</p>

            <a href="{% url 'category_list' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'category' in request.path %}
               bg-brand-600 text-white font-bold shadow-md shadow-brand-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-layer-group w-5 text-center transition-colors
                {% if 'category' in request.path %}text-white{% else %}text-slate-500 group-hover:text-brand-400{% endif %}"></i>
                <span>Categories</span>
            </a>

            <a href="{% url 'product_view' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'product' in request.path and 'pending' not in request.path %}
               bg-brand-600 text-white font-bold shadow-md shadow-brand-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-boxes-stacked w-5 text-center transition-colors
                {% if 'product' in request.path and 'pending' not in request.path %}text-white{% else %}text-slate-500 group-hover:text-brand-400{% endif %}"></i>
                <span>Products</span>
            </a>

            <a href="{% url 'order_view' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'order' in request.path %}
               bg-brand-600 text-white font-bold shadow-md shadow-brand-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-receipt w-5 text-center transition-colors
                {% if 'order' in request.path %}text-white{% else %}text-slate-500 group-hover:text-brand-400{% endif %}"></i>
                <span>Orders</span>
            </a>

            <a href="{% url 'user_view' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'user' in request.path %}
               bg-brand-600 text-white font-bold shadow-md shadow-brand-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-user-friends w-5 text-center transition-colors
                {% if 'user' in request.path %}text-white{% else %}text-slate-500 group-hover:text-brand-400{% endif %}"></i>
                <span>Customers</span>
            </a>

            <a href="{% url 'seller_view' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'seller' in request.path and 'pending' not in request.path %}
               bg-brand-600 text-white font-bold shadow-md shadow-brand-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-shop w-5 text-center transition-colors
                {% if 'seller' in request.path and 'pending' not in request.path %}text-white{% else %}text-slate-500 group-hover:text-brand-400{% endif %}"></i>
                <span>Sellers</span>
            </a>
        </div>

        <div class="space-y-2">
            <p class="text-[10px] font-bold text-slate-500 px-3 uppercase tracking-widest mb-3">Pending Actions</p>

            <a href="{% url 'pending_seller' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'pending_seller' in request.path %}
               bg-amber-500 text-white font-bold shadow-md shadow-amber-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-user-clock w-5 text-center transition-colors
                {% if 'pending_seller' in request.path %}text-white{% else %}text-slate-500 group-hover:text-amber-400{% endif %}"></i>
                <span>Seller Approvals</span>
            </a>

            <a href="{% url 'pending_products' %}" 
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group
               {% if 'pending_products' in request.path %}
               bg-amber-500 text-white font-bold shadow-md shadow-amber-900/20
               {% else %}
               text-slate-400 hover:bg-slate-800/80 hover:text-white font-medium
               {% endif %}">
                <i class="fas fa-clipboard-list w-5 text-center transition-colors
                {% if 'pending_products' in request.path %}text-white{% else %}text-slate-500 group-hover:text-amber-400{% endif %}"></i>
                <span>Product Approvals</span>
            </a>
        </div>

    </nav>

    <div class="p-6 border-t border-slate-800 shrink-0 bg-slate-900">
        <a href="#" 
           class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold
           bg-slate-800 text-rose-400 border border-slate-700/50 hover:bg-rose-500 hover:border-rose-500 hover:text-white transition-all shadow-sm">
            <i class="fas fa-power-off"></i>
            <span>Sign Out</span>
        </a>
    </div>

</aside>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebar = document.getElementById('admin-sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        const closeBtn = document.getElementById('close-sidebar');
        
        // Add an ID to your mobile hamburger button (e.g., id="open-sidebar") in your top nav to trigger this
        const openBtn = document.getElementById('open-sidebar'); 

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            
            if (backdrop.classList.contains('hidden')) {
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
            } else {
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        if (openBtn) openBtn.addEventListener('click', toggleSidebar);
        if (closeBtn) closeBtn.addEventListener('click', toggleSidebar);
        if (backdrop) backdrop.addEventListener('click', toggleSidebar);
    });
</script>

<style>
    /* Dark scrollbar for the sidebar */
    .custom-scrollbar-dark::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar-dark::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar-dark::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .custom-scrollbar-dark::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>
