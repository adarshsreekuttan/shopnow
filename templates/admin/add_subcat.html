<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Add Sub-Category | Admin</title>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-indigo-600 px-8 py-6">
            <h1 class="text-xl font-bold text-white">Add Sub-Category</h1>
            <p class="text-indigo-100 text-sm">Create a nested category for better product organization.</p>
        </div>

        <form action="" method="POST" class="p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label for="category" class="block text-sm font-semibold text-gray-700 mb-2">Parent Category</label>
                <div class="relative">
                    <select name="category" id="category" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition bg-white">
                        <option value="" disabled selected>Select a category</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Sub-Category Name</label>
                <input type="text" name="name" id="name" required 
                    placeholder="e.g. Running Shoes, T-Shirts"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
            </div>

            <div class="flex items-center justify-end space-x-4 pt-4 border-t">
                <a href="{% url 'subcat_list' %}" 
                    class="px-6 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    Cancel
                </a>
                <button type="submit" 
                    class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-lg shadow-md hover:shadow-indigo-200 transition">
                    Save Sub-Category
                </button>
            </div>
        </form>
    </div>

</body>
</html>
