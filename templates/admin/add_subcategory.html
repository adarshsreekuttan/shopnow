<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Add Subcategory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style type="text/tailwindcss">
        @layer components {
            .form-label {
                @apply block text-sm font-bold text-slate-700 mb-2;
            }
            .form-input {
                @apply w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-slate-50/50 focus:bg-white text-sm;
            }
            .btn-primary {
                @apply w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-sm hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all flex items-center justify-center gap-2;
            }
            .btn-back {
                @apply inline-flex items-center text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-indigo-600 transition-colors mb-6;
            }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 antialiased font-sans flex min-h-screen">

    <aside class="w-64 bg-white border-r border-slate-200 sticky top-0 h-screen overflow-y-auto z-50 flex-shrink-0">
        {% include 'admin/admin_navbar.html' %}
    </aside>

    <main class="flex-1 min-w-0">
        <div class="max-w-3xl mx-auto px-6 py-10">
            
            <a href="{% url 'category_list' %}" class="btn-back">
                <i class="fas fa-arrow-left mr-2"></i> Back to Categories
            </a>

            <div class="mb-10">
                <h1 class="text-3xl font-black tracking-tight text-slate-900">Add New Subcategory</h1>
                <p class="text-slate-500 mt-1 font-medium">Create a new sub-group to organize your inventory better.</p>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-8 md:p-12">
                    <form method="POST" class="space-y-8">
                        {% csrf_token %}
                        
                        <div>
                            <label for="name" class="form-label">Subcategory Name</label>
                            <div class="relative group">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors">
                                    <i class="fas fa-tag text-xs"></i>
                                </div>
                                <input type="text" name="name" id="name" placeholder="e.g. Wireless Headphones" 
                                       class="form-input pl-11" required>
                            </div>
                        </div>

                        <div>
                            <label for="category" class="form-label">Parent Category</label>
                            <div class="relative">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none">
                                    <i class="fas fa-folder-tree text-xs"></i>
                                </div>
                               <select name="category" id="category" class="form-input pl-11 appearance-none cursor-pointer" required>
    
                                    <option value="" disabled {% if not selected_category %}selected{% endif %}>
                                        Select a parent category...
                                    </option>

                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}"
                                            {% if selected_category == cat.id %}selected{% endif %}>
                                            {{ cat.name }}
                                        </option>
                                    {% endfor %}

                                </select>
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                    <i class="fas fa-chevron-down text-[10px]"></i>
                                </div>
                            </div>
                            <p class="mt-3 text-[11px] text-slate-400 flex items-start gap-2 italic">
                                <i class="fas fa-circle-info mt-0.5"></i>
                                This subcategory will inherit the main settings and visibility of its parent category.
                            </p>
                        </div>

                        <hr class="border-slate-100">

                        <div class="flex flex-col sm:flex-row gap-4 pt-2">
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-plus-circle"></i> Create Subcategory
                            </button>
                            <a href="{% url 'category_list' %}" class="flex-1 px-6 py-4 bg-slate-50 text-slate-500 rounded-2xl font-bold text-sm hover:bg-slate-100 transition-all flex items-center justify-center">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
